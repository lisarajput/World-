<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>Global Conquest: Continents, 4D & Chat Masterpiece</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Space+Grotesk:wght@500;700;900&display=swap" rel="stylesheet">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('App ready for install!', reg))
                .catch(err => console.error('Service Worker Error', err));
            });
        }
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; overflow: hidden; margin: 0; user-select: none; touch-action: none; }
        .map-bg { background: radial-gradient(circle at center, #ffffff 0%, #cbd5e1 100%); width: 100vw; height: 100vh; position: relative; }
        
        /* App Install Popup CSS */
        .install-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); z-index: 99999; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.4s ease-out; }
        .install-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 2px solid #3b82f6; border-radius: 24px; padding: 30px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 25px 50px -12px rgba(59, 130, 246, 0.5); animation: scaleUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); color: white; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* 4D Moving Clouds Layer */
        .clouds { position: absolute; inset: 0; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" opacity="0.05"><circle cx="150" cy="150" r="100" fill="%2394a3b8" filter="blur(40px)"/><circle cx="400" cy="300" r="150" fill="%2364748b" filter="blur(60px)"/></svg>'); animation: drift 80s linear infinite; pointer-events: none; z-index: 5; }
        @keyframes drift { from { background-position: 0 0; } to { background-position: 2000px 1000px; } }

        /* 3D Map Effects - LIGHT THEME */
        .country-surface { stroke: #ffffff; stroke-width: 2.5; stroke-linejoin: round; transition: filter 0.2s ease, transform 0.2s; cursor: pointer; pointer-events: auto; transform-origin: center; }
        .country-surface:hover { filter: brightness(1.1); transform: scale(1.005); }
        .water-body { fill: #38bdf8; opacity: 0.15; pointer-events: none; filter: drop-shadow(inset 0 0 80px rgba(2,132,199,0.3)); }
        
        .country-base { fill: #e2e8f0; stroke: #94a3b8; stroke-width: 3; stroke-linejoin: round; filter: drop-shadow(0px 15px 25px rgba(0,0,0,0.15)); pointer-events: none; }
        .country-highlight { fill: none; stroke: rgba(255,255,255,0.9); stroke-width: 2; pointer-events: none; }

        .army-text { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 900; fill: #ffffff; text-anchor: middle; dominant-baseline: central; pointer-events: none; text-shadow: 0px 3px 6px rgba(0,0,0,0.7); }
        .wall-text { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 800; fill: #bae6fd; text-anchor: middle; dominant-baseline: central; pointer-events: none; text-shadow: 0px 2px 4px rgba(0,0,0,0.8); }
        .info-text { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 900; fill: #0f172a; text-anchor: middle; dominant-baseline: central; pointer-events: none; text-shadow: 0px 2px 4px rgba(255,255,255,0.8); }
        
        .continent-label { font-family: 'Space Grotesk', sans-serif; font-size: 90px; font-weight: 900; fill: rgba(15,23,42,0.06); text-anchor: middle; pointer-events: none; letter-spacing: 30px; }

        .shield-fence { fill: none; stroke: #38bdf8; stroke-width: 10; stroke-dasharray: 20, 20; animation: rotateFence 8s linear infinite; pointer-events: none; filter: drop-shadow(0 0 10px rgba(56,189,248,0.6)); }
        .ultimate-fence { fill: none; stroke: #eab308; stroke-width: 12; stroke-dasharray: 30, 15; animation: rotateFence 4s linear infinite; pointer-events: none; filter: drop-shadow(0 0 15px rgba(234,179,8,0.6)); }
        
        @keyframes rotateFence { to { stroke-dashoffset: 100; } }
        .aura-glow { animation: pulse-aura 2s infinite alternate; }
        @keyframes pulse-aura { 0% { filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); } 100% { filter: drop-shadow(0 0 25px rgba(255,255,255,1)); } }

        .nmc-glow { animation: pulse-nmc 1s infinite alternate; }
        @keyframes pulse-nmc { 0% { filter: drop-shadow(0 0 15px rgba(239,68,68,0.6)); } 100% { filter: drop-shadow(0 0 40px rgba(239,68,68,0.9)); } }

        .drag-line { stroke: #0f172a; stroke-width: 8; stroke-dasharray: 15, 15; animation: dash 0.5s linear infinite; pointer-events: none; opacity: 0.7; filter: drop-shadow(0px 5px 10px rgba(0,0,0,0.2)); }
        @keyframes dash { to { stroke-dashoffset: -30; } }

        .combat-popup { font-family: 'Space Grotesk', sans-serif; font-weight: 900; pointer-events: none; animation: floatUp 1.5s ease-out forwards; text-shadow: 0 4px 8px rgba(0,0,0,0.4); z-index: 10; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(0.8); } 30% { transform: translateY(-35px) scale(1.4); } 100% { opacity: 0; transform: translateY(-90px) scale(1); } }

        .shockwave { fill: #ef4444; opacity: 0.6; animation: expandShock 1.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; pointer-events: none; }
        @keyframes expandShock { 0% { r: 0; opacity: 0.8; } 100% { r: 500px; opacity: 0; } }

        .emp-shockwave { fill: #8b5cf6; opacity: 0.5; animation: expandEmp 2s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; pointer-events: none; }
        @keyframes expandEmp { 0% { r: 0; opacity: 0.7; stroke-width: 20px; stroke: #c084fc; } 100% { r: 600px; opacity: 0; stroke-width: 2px; stroke: #c084fc; } }

        /* HD Weapon Tracers & Real Lightning */
        .tracer { stroke: #fbbf24; stroke-width: 5; opacity: 0.9; animation: fadeOut 0.2s ease-out forwards; pointer-events: none; filter: drop-shadow(0 0 6px #f59e0b); }
        .mg-tracer { stroke: #fde047; stroke-width: 4; stroke-dasharray: 10 20; animation: bulletStream 0.15s linear infinite, fadeOut 0.3s ease-out forwards; pointer-events: none; filter: drop-shadow(0 0 5px #eab308); }
        @keyframes bulletStream { to { stroke-dashoffset: -30; } }
        
        .laser-beam-outer { stroke: #ff0000; stroke-width: 50; opacity: 0.8; animation: fadeOutLaser 1s ease-out forwards; pointer-events: none; filter: drop-shadow(0 0 40px #ff0000); stroke-linecap: round; }
        .laser-beam-inner { stroke: #ffffff; stroke-width: 18; opacity: 1; animation: fadeOutLaser 1s ease-out forwards; pointer-events: none; stroke-linecap: round; }
        
        .auto-rifle-outer { stroke: #22c55e; stroke-width: 30; opacity: 0.8; animation: fadeOutLaser 0.5s ease-out forwards; pointer-events: none; filter: drop-shadow(0 0 30px #22c55e); stroke-linecap: round; }
        .auto-rifle-inner { stroke: #ffffff; stroke-width: 10; opacity: 1; animation: fadeOutLaser 0.5s ease-out forwards; pointer-events: none; stroke-linecap: round; }

        .carrier-aa-outer { stroke: #3b82f6; stroke-width: 20; opacity: 0.8; animation: fadeOutLaser 0.3s ease-out forwards; pointer-events: none; filter: drop-shadow(0 0 20px #3b82f6); stroke-linecap: round; }
        .carrier-aa-inner { stroke: #ffffff; stroke-width: 6; opacity: 1; animation: fadeOutLaser 0.3s ease-out forwards; pointer-events: none; stroke-linecap: round; }
        
        /* 4D PURE WHITE HD LIGHTNING */
        .white-lightning { fill: none; stroke: #ffffff; stroke-width: 7; filter: drop-shadow(0 0 10px #ffffff) drop-shadow(0 0 30px #ffffff); animation: lightningFlicker 0.1s infinite alternate, fadeOut 0.6s ease-in forwards; pointer-events: none; stroke-linejoin: miter; stroke-linecap: round;}
        
        /* 4D PURE RED HD LIGHTNING */
        .red-lightning { fill: none; stroke: #ff0000; stroke-width: 8; filter: drop-shadow(0 0 15px #ff0000) drop-shadow(0 0 40px #dc2626); animation: lightningFlicker 0.08s infinite alternate, fadeOut 0.5s ease-in forwards; pointer-events: none; stroke-linejoin: miter; stroke-linecap: round;}
        
        @keyframes lightningFlicker { 0% { opacity: 0.7; stroke-width: 4; } 100% { opacity: 1; stroke-width: 10; } }
        @keyframes fadeOutLaser { 0% { opacity: 1; } 100% { opacity: 0; stroke-width: 2; } }
        .ballistic-trail { stroke: #f97316; stroke-width: 10; stroke-dasharray: 25 15; opacity: 0.9; animation: dash 0.2s linear infinite; pointer-events: none; filter: drop-shadow(0 0 10px #ea580c); }
        @keyframes fadeOut { to { opacity: 0; stroke-width: 0; } }

        /* UI Panels */
        .btn-3d { transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1); border-bottom-width: 4px; position: relative; }
        .btn-3d:active { border-bottom-width: 0px; transform: translateY(4px); }
        
        .sidebar { transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar.open { transform: translateX(0); }

        .panel-3d { background: linear-gradient(145deg, #ffffff, #f8fafc); border: 1px solid #e2e8f0; box-shadow: 0 10px 25px rgba(0,0,0,0.1), inset 0 2px 0 rgba(255,255,255,1); border-radius: 16px; color: #0f172a; }
        
        .targeting-mode { cursor: crosshair !important; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        table { border-collapse: separate; border-spacing: 0; width: 100%; color: #0f172a; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; }
        th { background: #f1f5f9; font-weight: 800; color: #475569; position: sticky; top: 0; z-index: 10; text-transform: uppercase; letter-spacing: 1px; font-size: 11px; }
        td { font-weight: 700; font-size: 14px; }
        tr:hover td { background: #f8fafc; }
    </style>
</head>

    <script type="text/babel" data-type="module">
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let soundEnabled = true;
        
        function playSound(type) {
            if (!soundEnabled || audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            switch(type) {
                case 'army': osc.type = 'square'; osc.frequency.setValueAtTime(100, now); osc.frequency.exponentialRampToValueAtTime(30, now+0.15); gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now+0.15); osc.start(now); osc.stop(now+0.15); break;
                case 'airforce': osc.type = 'sawtooth'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(100, now+0.4); gain.gain.setValueAtTime(0.05, now); gain.gain.linearRampToValueAtTime(0, now+0.4); osc.start(now); osc.stop(now+0.4); break;
                case 'naval': osc.type = 'sine'; osc.frequency.setValueAtTime(60, now); osc.frequency.setValueAtTime(55, now+0.6); gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now+0.6); osc.start(now); osc.stop(now+0.6); break;
                case 'capture': osc.type = 'triangle'; osc.frequency.setValueAtTime(440, now); osc.frequency.setValueAtTime(660, now+0.1); osc.frequency.setValueAtTime(880, now+0.2); gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now+0.4); osc.start(now); osc.stop(now+0.4); break;
                case 'nuke': osc.type = 'sawtooth'; osc.frequency.setValueAtTime(80, now); osc.frequency.exponentialRampToValueAtTime(10, now+2); gain.gain.setValueAtTime(0.4, now); gain.gain.exponentialRampToValueAtTime(0.01, now+2); osc.start(now); osc.stop(now+2); break;
                case 'laser': osc.type = 'sawtooth'; osc.frequency.setValueAtTime(50, now); osc.frequency.linearRampToValueAtTime(300, now+0.8); gain.gain.setValueAtTime(0.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now+0.8); osc.start(now); osc.stop(now+0.8); break;
                case 'orbital': osc.type = 'square'; osc.frequency.setValueAtTime(1000, now); osc.frequency.exponentialRampToValueAtTime(50, now+1.5); gain.gain.setValueAtTime(0.5, now); gain.gain.linearRampToValueAtTime(0, now+1.5); osc.start(now); osc.stop(now+1.5); break;
                case 'emp': osc.type = 'sine'; osc.frequency.setValueAtTime(1500, now); osc.frequency.linearRampToValueAtTime(200, now+1.0); gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0, now+1.0); osc.start(now); osc.stop(now+1.0); break;
                case 'ballistic': osc.type = 'square'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(50, now+1.0); gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0, now+1.0); osc.start(now); osc.stop(now+1.0); break;
                case 'cannon': osc.type = 'square'; osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(100, now+0.05); gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.01, now+0.05); osc.start(now); osc.stop(now+0.05); break;
                case 'error': osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, now); gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now+0.2); osc.start(now); osc.stop(now+0.2); break;
                case 'upgrade': osc.type = 'sine'; osc.frequency.setValueAtTime(1200, now); osc.frequency.exponentialRampToValueAtTime(2000, now+0.3); gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now+0.3); osc.start(now); osc.stop(now+0.3); break;
                case 'lightning': osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.linearRampToValueAtTime(4000, now+0.5); gain.gain.setValueAtTime(0.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now+0.5); osc.start(now); osc.stop(now+0.5); break;
                case 'redlightning': osc.type = 'sawtooth'; osc.frequency.setValueAtTime(50, now); osc.frequency.linearRampToValueAtTime(1000, now+0.8); gain.gain.setValueAtTime(0.6, now); gain.gain.exponentialRampToValueAtTime(0.01, now+0.8); osc.start(now); osc.stop(now+0.8); break;
            }
        }

            const segments = 15; const points = [`${x1},${y1}`];
            for (let i = 1; i < segments; i++) {

                const py = y1 + (y2 - y1) * (i / segments) + (Math.random() * 60 - 30);

        function generateMap() {
            const padSettings = [
                { name: 'Indira', cx: 1000, cy: 1000, count: 110, rX: 800, rY: 800 },

                { name: 'Shreya', cx: 3000, cy: 1500, count: 79, rX: 700, rY: 600 }
            ];

            let initialPoints = [];
            padSettings.forEach(pad => initialPoints.push({ x: pad.cx, y: pad.cy, type: 'island', continent: pad.name }));
            padSettings.forEach(pad => {
                for (let i = 0; i < pad.count; i++) {
                    let angle = Math.random() * Math.PI * 2, u = Math.random() + Math.random();
                    let r = u > 1 ? 2 - u : u; 
                    initialPoints.push({ x: pad.cx + Math.cos(angle) * r * pad.rX, y: pad.cy + Math.sin(angle) * r * pad.rY, type: 'land', continent: pad.name });
                }
            });

            for(let i=0; i<300; i++) initialPoints.push({ x: Math.random() * MAP_WIDTH, y: Math.random() * MAP_HEIGHT, type: 'water', continent: 'Ocean' });

            let flatCoords = initialPoints.map(p => [p.x, p.y]);
            const delaunay = d3.Delaunay.from(flatCoords);
            const voronoi = delaunay.voronoi([50, 50, MAP_WIDTH-50, MAP_HEIGHT-50]);

            let countries = []; let idCounter = 1;
            for (let i = 0; i < initialPoints.length; i++) {
                const poly = voronoi.cellPolygon(i); if (!poly) continue;
                const pt = initialPoints[i]; const center = d3.polygonCentroid(poly);
                const pad = padSettings.find(p => p.name === pt.continent);
                
                let isActuallyWater = pt.type === 'water';
                if (!isActuallyWater && pad) {
                    if (Math.pow((center[0]-pad.cx)/pad.rX, 2) + Math.pow((center[1]-pad.cy)/pad.rY, 2) > 1.2 && pt.type !== 'island') isActuallyWater = true;
                }

                if (isActuallyWater) { countries.push({ id: -i, path: "M" + poly.join("L") + "Z", isWater: true }); continue; }
                
                if (pt.type === 'island') {
                    countries.push({
                        id: idCounter++, path: "M" + poly.map(p => [center[0] + (p[0]-center[0])*0.5, center[1] + (p[1]-center[1])*0.5]).join("L") + "Z", cx: center[0], cy: center[1],
                        neighbors: [], ownerId: 0, army: 1000, wall: 0, cannonLevel: 0, hasSupporter: false, originalBase: null, nmcLevel: 0, isWater: false, minefieldUntil: 0, isUltimateFenced: false, isEmpedUntil: 0, isAegis: false,
                        isIsland: true, continent: pt.continent, teslaActive: false, teslaMode: 'active', teslaLoopTimer: 120, teslaSubTimer: 0, islandAATimer: 0, hasAutoRifle: false, autoRifleActive: false, autoRifleUptime: 0
                    }); continue;
                }

                countries.push({
                    id: idCounter++, path: "M" + poly.join("L") + "Z", cx: center[0], cy: center[1],
                    neighbors: Array.from(delaunay.neighbors(i)), ownerId: 0, army: Math.floor(Math.random() * 10) + 5,
                    wall: 0, cannonLevel: 0, hasSupporter: false, originalBase: null, nmcLevel: 0, nmcTimer: 20, isWater: false,
                    minefieldUntil: 0, isUltimateFenced: false, isEmpedUntil: 0, isAegis: false, isIsland: false, continent: pt.continent, hasAutoRifle: false, autoRifleActive: false, autoRifleUptime: 0
                });
            }

            countries.forEach(c => { if(!c.isWater) c.neighbors = countries.filter(n => !n.isWater && n.id !== c.id && Math.hypot(n.cx - c.cx, n.cy - c.cy) < 400).map(n => n.id); });

            let indiraBases = countries.filter(c => !c.isWater && !c.isIsland && c.continent === 'Indira').sort(() => Math.random() - 0.5);
            for (let i = 1; i <= 14; i++) {
                if (indiraBases.length === 0) break;
                const node = indiraBases.pop(); node.ownerId = i; node.army = 100;
            }
            return countries;

                                            {state.carriers.some(car=>car.baseId === c.id) && <g transform={`translate(${c.cx - 30}, ${c.cy - 30})`} className="animate-bounce pointer-events-none"><circle cx="0" cy="0" r="14" fill="#1e293b" stroke="#38bdf8" strokeWidth="2"/><text y="5" fontSize="14" fill="#38bdf8" textAnchor="middle">📡</text></g>}
                                            {c.hasAutoRifle && <g transform={`translate(${c.cx - 20}, ${c.cy + 25})`} className="pointer-events-none"><circle cx="0" cy="0" r="12" fill="#064e3b" stroke="#22c55e" strokeWidth="2" className={c.autoRifleActive ? "animate-pulse" : "opacity-50"}/><text y="4" fontSize="10" fill="#4ade80" textAnchor="middle">🔫</text>{!c.autoRifleActive && <line x1="-10" y1="-10" x2="10" y2="10" stroke="#ef4444" strokeWidth="2"/>}</g>}

                                            {c.cannonLevel > 0 && (
                                                <g transform={`translate(${c.cx}, ${c.cy - 35})`} className="pointer-events-none">

                                                    <ellipse cx="0" cy="2" rx="14" ry="7" fill="#1e293b" stroke="#334155" strokeWidth="1"/>
                                                    <ellipse cx="0" cy="-2" rx="14" ry="7" fill="#334155" />
                                                    <circle cx="0" cy="-3" r="8" fill="#0f172a" />
                                                    <path d="M-3,-3 L-2,-20 L2,-20 L3,-3 Z" fill="#94a3b8" stroke="#0f172a" strokeWidth="1"/>
                                                    <path d="M-8,-2 C-8,-10 8,-10 8,-2 Z" fill="#64748b" stroke="#1e293b" strokeWidth="1.5"/>

                                                </g>
                                            )}

                                            {c.nmcLevel > 0 && (
                                                <g transform={`translate(${c.cx + 30}, ${c.cy - 25}) scale(1.8)`} className="pointer-events-none">
                                                    <circle cx="0" cy="0" r="10" fill="#1e293b" stroke="#ef4444" strokeWidth="2.5" className="animate-pulse"/>
                                                    <text y="3" fontSize="8" fill="#ef4444" textAnchor="middle" fontWeight="bold">☢</text>

                                                    <path d="M-2,-10 L3,-2 L-2,2 L5,10" fill="none" stroke={c.teslaMode === 'active' ? "#0ea5e9" : "#fff"} strokeWidth="2"/>
                                                </g>
                                            )}
                                        </g>
                                    );
                                })}

                                {dragSource && !viewMode && selectedWeapon === WEAPONS.AIR && <circle cx={dragSource.cx} cy={dragSource.cy} r={MAX_AIR_RANGE} fill="rgba(14, 165, 233, 0.05)" stroke="#0ea5e9" strokeWidth="4" strokeDasharray="25 25" className="animate-[spin_60s_linear_infinite]" pointerEvents="none" />}
                                {!viewMode && theIslands.map(isl => { if (isl.teslaActive && isl.teslaMode === 'active') { return <circle key={`rng-${isl.id}`} cx={isl.cx} cy={isl.cy} r={MAX_AIR_RANGE * 0.49} fill="rgba(255, 255, 255, 0.05)" stroke="#ffffff" strokeWidth="3" strokeDasharray="10 10" pointerEvents="none" /> } return null; })}
                                {!viewMode && state.countries.filter(c => c.hasAutoRifle && c.autoRifleActive).map((c, i) => ( <circle key={`ar-${i}`} cx={c.cx} cy={c.cy} r={40} fill="none" stroke="#4ade80" strokeWidth="2" strokeDasharray="5 5" className="animate-[spin_4s_linear_infinite]" pointerEvents="none" /> ))}

                                {state.carriers.filter(car => car.active).map((car, idx) => (
                                    <g key={car.id} transform={`translate(${car.x}, ${car.y})`} style={{ filter: 'drop-shadow(0 20px 25px rgba(0,0,0,0.5))' }}>
                                        {car.type === 'original' && (
                                            <g>
                                                <path d="M-60,-10 L-40,-20 L50,-20 L60,0 L40,10 L-60,10 Z" fill="#64748b"/>
                                                <path d="M-60,-15 L-40,-25 L50,-25 L60,-5 L40,5 L-60,5 Z" fill="#94a3b8" stroke="#1e293b" strokeWidth="2"/>
                                                <line x1="-50" y1="-10" x2="40" y2="-10" stroke="#f8fafc" strokeWidth="3" strokeDasharray="10 5" />
                                                <rect x="10" y="-35" width="20" height="15" fill="#475569" stroke="#0f172a" strokeWidth="1" rx="2"/>
                                                <rect x="12" y="-38" width="16" height="15" fill="#cbd5e1" stroke="#1e293b" strokeWidth="1" rx="1"/>
                                                <circle cx="20" cy="-35" r="3" fill="#ef4444" className="animate-pulse"/>
                                                <circle cx="-30" cy="0" r="4" fill="#0f172a"/> <line x1="-30" y1="0" x2="-30" y2="10" stroke="#3b82f6" strokeWidth="2"/>
                                                {!viewMode && <text y="20" fontSize="12" fill="#0f172a" textAnchor="middle" fontWeight="bold" style={{fontFamily:'Space Grotesk'}}>ORIGINAL Lv.{car.level}</text>}
                                            </g>
                                        )}
                                        {car.type === 'nuke' && (
                                            <g>
                                                <path d="M-50,2 L-20,-23 L30,-13 L60,2 L30,17 L-20,27 Z" fill="#334155"/>
                                                <path d="M-50,-3 L-20,-28 L30,-18 L60,-3 L30,12 L-20,22 Z" fill="#475569" stroke="#0f172a" strokeWidth="2"/>
                                                <path d="M-40,-5 L-15,-20 L25,-13 L50,-5 L25,3 L-15,10 Z" fill="#94a3b8" />
                                                <circle cx="-10" cy="-5" r="10" fill="#0f172a" stroke="#22c55e" strokeWidth="1"/>
                                                <circle cx="-10" cy="-5" r="4" fill="#22c55e" className="animate-pulse"/>
                                                <circle cx="20" cy="-5" r="4" fill="#020617"/> <line x1="20" y1="-5" x2="20" y2="-15" stroke="#3b82f6" strokeWidth="2"/>
                                                {!viewMode && <text y="35" fontSize="12" fill="#166534" textAnchor="middle" fontWeight="bold" style={{fontFamily:'Space Grotesk'}}>TACTICAL Lv.{car.level}</text>}
                                            </g>
                                        )}
                                        {car.type === 'plasma' && (
                                            <g>
                                                <path d="M-60,2 L-30,-28 L40,-8 L70,2 L40,12 L-30,32 Z" fill="#4c1d95"/>
                                                <path d="M-60,-3 L-30,-33 L40,-13 L70,-3 L40,7 L-30,27 Z" fill="#6b21a8" stroke="#2e1065" strokeWidth="2"/>
                                                <circle cx="10" cy="-5" r="16" fill="#1e1b4b" stroke="#38bdf8" strokeWidth="3"/>
                                                <circle cx="10" cy="-5" r="6" fill="#38bdf8" className="animate-ping"/>
                                                <line x1="-30" y1="-33" x2="-60" y2="-3" stroke="#d8b4fe" strokeWidth="3"/>
                                                <line x1="-30" y1="27" x2="-60" y2="-3" stroke="#d8b4fe" strokeWidth="3"/>
                                                <circle cx="-20" cy="-5" r="4" fill="#1e1b4b"/> <line x1="-20" y1="-5" x2="-20" y2="5" stroke="#3b82f6" strokeWidth="2"/>
                                                {!viewMode && <text y="40" fontSize="12" fill="#4c1d95" textAnchor="middle" fontWeight="bold" style={{fontFamily:'Space Grotesk'}}>DREADNOUGHT Lv.{car.level}</text>}
                                            </g>
                                        )}
                                        {car.type === 'nano' && (
                                            <g>
                                                <path d="M-40,-10 Q0,-25 40,-5 Q60,5 40,15 Q0,35 -40,20 Q-60,5 -40,-10 Z" fill="#065f46"/>
                                                <path d="M-40,-15 Q0,-30 40,-10 Q60,0 40,10 Q0,30 -40,15 Q-60,0 -40,-15 Z" fill="#10b981" stroke="#022c22" strokeWidth="2"/>
                                                <ellipse cx="0" cy="-2" rx="20" ry="10" fill="#022c22"/>
                                                <circle cx="-10" cy="-2" r="4" fill="#34d399" className="animate-pulse"/>
                                                <circle cx="10" cy="-2" r="4" fill="#34d399" className="animate-pulse"/>
                                                <circle cx="30" cy="-2" r="4" fill="#022c22"/> <line x1="30" y1="-2" x2="30" y2="-12" stroke="#3b82f6" strokeWidth="2"/>
                                                {!viewMode && <text y="35" fontSize="12" fill="#064e3b" textAnchor="middle" fontWeight="bold" style={{fontFamily:'Space Grotesk'}}>LEVIATHAN Lv.{car.level}</text>}
                                            </g>
                                        )}
                                        <g transform="translate(-30, -5)">{Array.from({length: Math.min(car.level, 5)}).map((_, i) => (<circle key={i} cx={(i%3)*12} cy={Math.floor(i/3)*8} r="2" fill="#0f172a" opacity="0.6"/>))}</g>
                                    </g>
                                ))}

                                {state.helicopters && state.helicopters.map(h => {
                                    if (h.phase === 'reloading') return null; 
                                    return (
                                        <g key={h.id} transform={`translate(${h.x}, ${h.y}) rotate(${h.angle * 180 / Math.PI}) scale(1.5)`} className="pointer-events-none" style={{ filter: 'drop-shadow(0 25px 25px rgba(0,0,0,0.6))' }}>
                                            <path d="M-10,0 Q-10,-5 5,-5 L15,0 L5,5 Q-10,5 -10,0 Z" fill="#475569" /> <circle cx="5" cy="0" r="3" fill="#cbd5e1" /> <line x1="-10" y1="0" x2="-25" y2="0" stroke="#1e293b" strokeWidth="2" /> <circle cx="-25" cy="0" r="2" fill="#ef4444" /> <line x1="-5" y1="-8" x2="15" y2="8" stroke="#ffffff" strokeWidth="1" className="animate-[spin_0.05s_linear_infinite]" /> 
                                        </g>
                                    );
                                })}

                                {state.tracers.map((tr, i) => {
                                    if(tr.isNmcLaser) return <g key={i} className="pointer-events-none"><line x1={tr.x1} y1={tr.y1} x2={tr.x2} y2={tr.y2} className="laser-beam-outer" /><line x1={tr.x1} y1={tr.y1} x2={tr.x2} y2={tr.y2} className="laser-beam-inner" /></g>;
                                    if(tr.isOrbital) return <g key={i} className="pointer-events-none"><line x1={tr.x1} y1={tr.y1} x2={tr.x2} y2={tr.y2} className="orbital-beam-outer" /><line x1={tr.x1} y1={tr.y1} x2={tr.x2} y2={tr.y2} className="orbital-beam-inner" /></g>;
                                    if(tr.isAutoRifle) return <g key={i} className="pointer-events-none"><line x1={tr.x1} y1={tr.y1} x2={tr.x2} y2={tr.y2} className="auto-rifle-outer" /><line x1={tr.x1} y1={tr.y1} x2={tr.x2} y2={tr.y2} className="auto-rifle-inner" /></g>;
                                    if(tr.isCarrierAA) return <g key={i} className="pointer-events-none"><line x1={tr.x1} y1={tr.y1} x2={tr.x2} y2={tr.y2} className="carrier-aa-outer" /><line x1={tr.x1} y1={tr.y1} x2={tr.x2} y2={tr.y2} className="carrier-aa-inner" /></g>;
                                    if(tr.isWhiteLightning || tr.isLightning) return <polyline key={i} points={generateLightningPoints(tr.x1, tr.y1, tr.x2, tr.y2)} className="white-lightning" />;
                                    if(tr.isRedLightning) return <polyline key={i} points={generateLightningPoints(tr.x1, tr.y1, tr.x2, tr.y2)} className="red-lightning" />;
                                    if(tr.isChain) return <line key={i} x1={tr.x1} y1={tr.y1} x2={tr.x2} y2={tr.y2} className="chain-tracer" />;
                                    return <line key={i} x1={tr.x1} y1={tr.y1} x2={tr.x2} y2={tr.y2} className={tr.isMg ? 'mg-tracer' : 'tracer'} style={{stroke: tr.color || '#fde047'}} />;
                                })}

                                {state.movements.map(m => {
                                    let curX, curY, angle;
                                    if (['anbc_jet', 'c2_jet', 'c3_swarm', 'orig_jet'].includes(m.type)) {
                                        if (m.phase === 'outbound') { const tgt = state.countries.find(c=>c.id===m.toId); curX = m.startX + (tgt.cx - m.startX) * m.progress; curY = m.startY + (tgt.cy - m.startY) * m.progress; angle = Math.atan2(tgt.cy - m.startY, tgt.cx - m.startX) * 180 / Math.PI; } 
                                        else { const car = state.carriers.find(x=>x.type === m.carrierType); curX = m.startX + (car.x - m.startX) * m.progress; curY = m.startY + (car.y - m.startY) * m.progress; angle = Math.atan2(car.y - m.startY, car.x - m.startX) * 180 / Math.PI; }
                                        return (
                                            <g key={m.id} transform={`translate(${curX}, ${curY}) rotate(${angle}) scale(1.8)`} className="pointer-events-none" style={{ filter: 'drop-shadow(0 20px 20px rgba(0,0,0,0.6))' }}>
                                                {m.type === 'orig_jet' && <><path d="M-15,-8 L15,0 L-15,8 L-5,0 Z" fill="#94a3b8" stroke="#475569" strokeWidth="1"/><circle cx="2" cy="0" r="3" fill="#3b82f6"/></>}
                                                {m.type === 'anbc_jet' && <><path d="M-15,-12 L10,0 L-15,12 Z" fill="#1e293b" stroke="#22c55e" strokeWidth="1"/><circle cx="0" cy="0" r="2" fill="#22c55e"/></>}
                                                {m.type === 'c2_jet' && <><ellipse cx="0" cy="0" rx="12" ry="6" fill="#3b0764" stroke="#0ea5e9" strokeWidth="1"/><circle cx="0" cy="0" r="3" fill="#0ea5e9"/></>}
                                                {m.type === 'c3_swarm' && <><circle cx="0" cy="-6" r="3" fill="#10b981"/><circle cx="-6" cy="6" r="3" fill="#10b981"/><circle cx="6" cy="6" r="3" fill="#10b981"/></>}
                                            </g>
                                        );
                                    }
                                    if (['anbc_ballistic', 'c2_emp', 'c3_nano', 'orig_missile'].includes(m.type)) {
                                        const tgt = state.countries.find(c=>c.id===m.toId); curX = m.startX + (tgt.cx - m.startX) * m.progress; curY = m.startY + (tgt.cy - m.startY) * m.progress; angle = Math.atan2(tgt.cy - m.startY, tgt.cx - m.startX) * 180 / Math.PI;
                                        return (
                                            <g key={m.id} transform={`translate(${curX}, ${curY}) rotate(${angle})`} className="pointer-events-none">
                                                <path d="M-15,-6 L15,0 L-15,6 Z" fill={m.type==='c2_emp'?'#a855f7':(m.type==='c3_nano'?'#10b981':(m.type==='orig_missile'?'#3b82f6':'#ea580c'))} />
                                                <circle cx="-15" cy="0" r="6" fill="#fde047" className="animate-pulse" />
                                                <line x1="-15" y1="0" x2="-40" y2="0" className="ballistic-trail" style={{stroke: m.type==='c2_emp'?'#c084fc':(m.type==='c3_nano'?'#34d399':(m.type==='orig_missile'?'#60a5fa':'#f97316'))}} />
                                            </g>
                                        );
                                    }

                                    const src = state.countries.find(c => c.id === m.fromId); const tgt = state.countries.find(c => c.id === m.toId); const p = state.players.find(x => x.id === m.ownerId); if (!src || !tgt || !p) return null;
                                    curX = m.startX + (tgt.cx - m.startX) * m.progress; curY = m.startY + (tgt.cy - m.startY) * m.progress; angle = Math.atan2(tgt.cy - m.startY, tgt.cx - m.startX) * 180 / Math.PI;

                                    return (
                                        <g key={m.id} transform={`translate(${curX}, ${curY})`} className="pointer-events-none">
                                            {m.type === WEAPONS.ARMY && (
                                                <g style={{ filter: 'drop-shadow(0 10px 10px rgba(0,0,0,0.5))' }}>
                                                    <rect x="-8" y="-6" width="16" height="12" fill="#475569" rx="2" /> <rect x="-6" y="-4" width="12" height="8" fill={p.color} rx="1" /> <circle cx="0" cy="0" r="3" fill="#0f172a" /> <line x1="0" y1="0" x2="8" y2="0" stroke="#0f172a" strokeWidth="2" transform={`rotate(${angle * -1})`} />
                                                </g>
                                            )}
                                            {m.type === WEAPONS.AIR && (
                                                <g transform={`rotate(${angle}) scale(1.6)`}>
                                                    <path d="M-15,-8 L15,0 L-15,8 L-5,0 Z" fill="rgba(0,0,0,0.5)" transform="translate(-15, 25) scale(0.7)" style={{filter: 'blur(5px)'}} />
                                                    <path d="M-15,-8 L15,0 L-15,8 L-5,0 Z" fill={p.color} stroke="#0f172a" strokeWidth="1"/> <path d="M-10,-4 L10,0 L-10,4 L-2,0 Z" fill="rgba(255,255,255,0.4)"/> <circle cx="2" cy="0" r="2" fill="#fff"/>
                                                </g>
                                            )}
                                            {m.type === WEAPONS.NAVAL && (
                                                <g transform={`rotate(${angle}) scale(1.6)`}>
                                                    <path d="M-15,0 L-30,-15 L-25,0 L-30,15 Z" fill="rgba(255,255,255,0.6)" />
                                                    <path d="M-15,-6 L10,-6 L20,0 L10,6 L-15,6 Z" fill="#334155" stroke={p.color} strokeWidth="1" style={{ filter: 'drop-shadow(0 5px 5px rgba(0,0,0,0.6))' }}/>
                                                    <rect x="-8" y="-3" width="8" height="6" fill={p.color}/> <circle cx="-4" cy="0" r="1.5" fill="#fff"/>
                                                </g>
                                            )}
                                        </g>
                                    );
                                })}

                                {dragSource && !viewMode && <line x1={dragSource.cx} y1={dragSource.cy} x2={state.mouseX} y2={state.mouseY} className="drag-line" />}
                                {state.popups.map((p, i) => <text key={i} x={p.x} y={p.y} fill={p.color} fontSize="26" className="combat-popup">{p.text}</text>)}
                                {state.shockwaves.map((s, i) => <circle key={i} cx={s.x} cy={s.y} className={s.isEmp ? 'emp-shockwave' : 'shockwave'} />)}
                            </svg>
                        </div>
                    </div>
                    
                    {gracePeriod > 0 && !viewMode && <div className="absolute top-20 left-1/2 transform -translate-x-1/2 z-10 font-black text-4xl text-slate-800 opacity-60 pointer-events-none font-['Space_Grotesk'] tracking-widest text-center drop-shadow-xl">PEACE TREATY<br/>{gracePeriod}s</div>}

                    {!viewMode && (
                        <div className="absolute top-4 left-1/2 transform -translate-x-1/2 z-20 flex gap-2 pointer-events-none">
                            <div className={`panel-3d px-4 py-2 flex items-center gap-2 ${user.gold < 0 ? 'border-red-500' : ''}`}><Icon name="Coins" className={user.gold < 0 ? 'text-red-500' : 'text-yellow-600'} size={18} /><span className={`text-lg font-black font-['Space_Grotesk'] ${user.gold < 0 ? 'text-red-600' : 'text-slate-800'}`}>{Math.floor(user.gold)}</span></div>
                            <div className="panel-3d px-4 py-2 flex items-center gap-2"><Icon name="Shield" className="text-blue-600" size={18} /><span className="text-lg font-black font-['Space_Grotesk'] text-slate-800">{Math.floor(state.countries.filter(c=>c.ownerId===1).reduce((s,c)=>s+c.army,0))}</span></div>
                        </div>
                    )}

                    {/* Left side Leaderboard UI */}
                    {!viewMode && (
                        <div className="absolute bottom-4 left-4 z-20 flex flex-col gap-2">
                            {shieldTimeLeft > 0 && <div className="bg-sky-500 text-white px-3 py-1.5 rounded-xl flex items-center gap-1 font-black text-[11px] shadow-md border-b-2 border-sky-700 w-fit"><Icon name="Lock" size={14} /> SHIELD: {shieldTimeLeft}s</div>}
                            {user.fencesCount > 0 && <div className="bg-yellow-500 text-slate-900 px-3 py-1.5 rounded-xl flex items-center font-bold text-[11px] shadow-md border-b-2 border-yellow-700 w-fit gap-1"><Icon name="Fence" size={14}/> FENCES: {user.fencesCount}/5</div>}

                            <div className="panel-3d p-4 w-56 pointer-events-auto opacity-95">
                                <div className="flex items-center justify-between border-b border-slate-300 pb-2 mb-2">
                                    <div className="flex items-center gap-3"><div className="w-12 h-12 rounded-full shadow-[0_0_10px_rgba(0,0,0,0.1)] border border-slate-300" style={{ background: `conic-gradient(${pieStops})` }}></div><h3 className="text-[11px] font-black text-slate-800 tracking-widest leading-tight">GLOBAL<br/>DOMINATION</h3></div>
                                    <div className="flex flex-col gap-1"><button onClick={() => setShowDetailedStats(true)} className="text-blue-600 hover:text-blue-800 bg-slate-100 p-1.5 rounded"><Icon name="BarChart" size={14}/></button><button onClick={() => setShowLeaderboard(!showLeaderboard)} className="text-slate-500 hover:text-slate-800 bg-slate-100 p-1.5 rounded"><Icon name={showLeaderboard ? "EyeOff" : "Eye"} size={14}/></button></div>
                                </div>
                                {showLeaderboard && (
                                    <div className="max-h-48 overflow-y-auto pr-1 space-y-1">

                                        ))}
                                        
                                        {!user.tech.heliUnlocked ? (
                                            <button onClick={() => handleUpgrade('heli_unlock')} disabled={user.gold < 5000000 || !allCarriersMaxed} className={`w-full mt-2 p-2.5 rounded-lg font-black flex justify-between items-center transition-all btn-3d ${user.gold >= 5000000 && allCarriersMaxed ? 'bg-orange-500 hover:bg-orange-400 text-white shadow-[0_0_10px_rgba(249,115,22,0.4)] border-orange-700' : 'bg-slate-200 text-slate-500 border-slate-300'}`}><span className="text-[10px] flex items-center gap-1"><Icon name="Target" size={12}/> UNLOCK HELICOPTER SQUADRONS</span><span className="text-[9px]">5M Gold</span></button>
                                        ) : (
                                            <div className="w-full mt-2 p-2.5 rounded-lg font-black flex justify-between items-center transition-all bg-emerald-100 text-emerald-700 border-emerald-300"><span className="text-[10px] flex items-center gap-1"><Icon name="Target" size={12}/> HELICOPTERS ACTIVE</span></div>
                                        )}

                                        {allCarriersMaxed && (
                                            <div className="mt-2 pt-2 border-t border-slate-300">
                                                <button onClick={() => { cancelTargeting(); engine.current.targetingAutoRifle = true; setShowCommandCenter(false); }} className="w-full p-2.5 rounded-lg font-black flex flex-col justify-center items-center transition-all btn-3d bg-emerald-600 hover:bg-emerald-500 text-white shadow-[0_0_10px_rgba(5,150,105,0.4)] border-emerald-800"><span className="text-[10px] flex items-center gap-1"><Icon name="Target" size={12}/> DEPLOY AUTO-RIFLE BASE</span><span className="text-[8px] text-emerald-200">Costs 1-2L Gold/sec | 100 Dmg/sec</span></button>
                                            </div>
                                        )}
                                    </div>

                                    {/* ISLAND TESLA UPGRADE */}
                                    <div className="space-y-2 mt-3 pt-3 border-t border-slate-300">
                                        <h3 className="font-black text-blue-600 tracking-widest text-[10px] text-center">ISLAND WEAPONRY</h3>
                                        <button onClick={() => handleUpgrade('activate_island')} disabled={user.gold < UPGRADE_COSTS.islandTesla || !ownsAnIsland || user.tech.islandTeslaActive} className={`w-full p-2.5 rounded-lg font-black flex justify-between items-center transition-all btn-3d ${user.tech.islandTeslaActive ? 'bg-cyan-100 text-cyan-700 border-cyan-300 cursor-default' : (user.gold >= UPGRADE_COSTS.islandTesla && ownsAnIsland ? 'bg-cyan-500 hover:bg-cyan-400 text-white shadow-[0_0_10px_rgba(6,182,212,0.4)] border-cyan-700' : 'bg-slate-200 text-slate-500 border-slate-300')}`}><span className="text-[10px] flex items-center gap-1"><Icon name="Zap" size={12}/> {user.tech.islandTeslaActive ? 'TESLA CITY ONLINE' : 'ACTIVATE ISLAND TESLA'}</span><span className="text-[9px]">{user.tech.islandTeslaActive ? '' : '1M Gold'}</span></button>
                                        {user.tech.islandTeslaActive && (
                                            <button onClick={() => handleUpgrade('activate_island_aa')} disabled={user.gold < UPGRADE_COSTS.islandAA || user.tech.islandAAActive} className={`w-full p-2.5 rounded-lg font-black flex justify-between items-center transition-all btn-3d ${user.tech.islandAAActive ? 'bg-red-100 text-red-700 border-red-300 cursor-default' : (user.gold >= UPGRADE_COSTS.islandAA ? 'bg-red-600 hover:bg-red-500 text-white shadow-[0_0_10px_rgba(220,38,38,0.4)] border-red-800' : 'bg-slate-200 text-slate-500 border-slate-300')}`}><span className="text-[10px] flex items-center gap-1"><Icon name="Radar" size={12}/> {user.tech.islandAAActive ? 'RED LIGHTNING AA ACTIVE' : 'UNLOCK RED LIGHTNING AA'}</span><span className="text-[9px]">{user.tech.islandAAActive ? '' : '2M Gold'}</span></button>
                                        )}
                                        <p className="text-[8px] text-slate-500 text-center leading-tight">Loops infinitely: Attacks for 2 mins, recharges for 1 min.</p>
                                    </div>

                                    {/* APEX TECHNOLOGIES */}
                                    <div className="mt-4 border-t border-slate-300 pt-3 space-y-2">
                                        <h3 className="font-black text-blue-600 tracking-widest text-[10px] text-center">APEX TECHNOLOGIES</h3>
                                        <button onClick={() => { cancelTargeting(); engine.current.targetingDeployArmy = true; setShowCommandCenter(false); }} disabled={user.gold < 4500000} className={`w-full p-2.5 rounded-lg font-black flex justify-between items-center transition-all btn-3d ${user.gold >= 4500000 ? 'bg-orange-500 hover:bg-orange-400 text-white shadow-[0_0_10px_rgba(249,115,22,0.4)] border-orange-700' : 'bg-slate-200 text-slate-500 border-slate-300'}`}><span className="text-[10px] flex items-center gap-1"><Icon name="Sword" size={12}/> DEPLOY ARMY (3000 Troops)</span><span className="text-[9px]">45L Gold</span></button>
                                        <button onClick={() => { cancelTargeting(); engine.current.targetingOrbital = true; setShowCommandCenter(false); }} disabled={user.gold < UPGRADE_COSTS.orbital} className={`w-full p-2.5 rounded-lg font-black flex justify-between items-center transition-all btn-3d ${user.gold >= UPGRADE_COSTS.orbital ? 'bg-cyan-500 hover:bg-cyan-400 text-white shadow-[0_0_10px_rgba(6,182,212,0.4)] border-cyan-700' : 'bg-slate-200 text-slate-500 border-slate-300'}`}><span className="text-[10px] flex items-center gap-1"><Icon name="Radar" size={12}/> ION ORBITAL STRIKE</span><span className="text-[9px]">3M Gold</span></button>
                                        <button onClick={() => { cancelTargeting(); engine.current.targetingEMP = true; setShowCommandCenter(false); }} disabled={user.gold < UPGRADE_COSTS.emp} className={`w-full p-2.5 rounded-lg font-black flex justify-between items-center transition-all btn-3d ${user.gold >= UPGRADE_COSTS.emp ? 'bg-indigo-500 hover:bg-indigo-400 text-white shadow-[0_0_10px_rgba(99,102,241,0.4)] border-indigo-700' : 'bg-slate-200 text-slate-500 border-slate-300'}`}><span className="text-[10px] flex items-center gap-1"><Icon name="Zap" size={12}/> EMP SHOCKWAVE</span><span className="text-[9px]">1M Gold</span></button>
                                        <UpgradeRow icon={<Icon name="Network" className="text-pink-500" size={16}/>} name="Quantum Relay" lvl={user.tech.quantum?1:0} cost={UPGRADE_COSTS.quantum} canAfford={user.gold >= UPGRADE_COSTS.quantum} desc="Instant Army Transfers." maxLvl={1} onClick={() => handleUpgrade('quantum')} />
                                        <UpgradeRow icon={<Icon name="Shield" className="text-teal-500" size={16}/>} name="Nanobot Armor" lvl={user.tech.nano?1:0} cost={UPGRADE_COSTS.nano} canAfford={user.gold >= UPGRADE_COSTS.nano} desc="Walls have 2x Cap & 5x Heal." maxLvl={1} onClick={() => handleUpgrade('nano')} />
                                        <UpgradeRow icon={<Icon name="Plane" className="text-gray-500" size={16}/>} name="Stealth Squadron" lvl={user.tech.stealth?1:0} cost={UPGRADE_COSTS.stealth} canAfford={user.gold >= UPGRADE_COSTS.stealth} desc="Jets immune to MG. 1.5x Dmg." maxLvl={1} onClick={() => handleUpgrade('stealth')} />
                                    </div>
                                </div>

                                <div className="mt-5 pt-3 border-t-2 border-slate-300 relative">
                                    <h3 className="font-black text-slate-800 mb-1.5 tracking-widest text-center text-xs">AUTOMATION</h3>
                                    {(!advMaxed || !rdMaxed || !hasDeployedNMC || !state.carriers[0].active) && (<div className="absolute inset-0 bg-white/80 backdrop-blur-[2px] z-10 flex items-center justify-center rounded-xl"></div>)}
                                    <UpgradeRow icon={<Icon name="Cpu" className="text-slate-800"/>} name="Auto-Pilot Commander" lvl={user.tech.autoTech} cost={UPGRADE_COSTS.autoTech(user.tech.autoTech)} canAfford={user.gold >= UPGRADE_COSTS.autoTech(user.tech.autoTech)} desc="Lvl 3 auto-attacks nearest enemies using Army/Air/Naval." maxLvl={3} onClick={() => handleUpgrade('autoTech')} />
                                    {user.tech.autoTech === 3 && ( <button onClick={() => { user.commanderActive = !user.commanderActive; setTick(t=>t+1); }} className={`w-full mt-3 p-2.5 rounded-xl font-bold transition-all border-2 ${user.commanderActive ? 'bg-red-100 text-red-700 border-red-300 hover:bg-red-200' : 'bg-emerald-100 text-emerald-700 border-emerald-300 hover:bg-emerald-200'}`}>{user.commanderActive ? 'DISABLE COMMANDER' : 'ENABLE COMMANDER'}</button> )}
                                </div>
                                
                                <div className="mt-5 pt-3 border-t-2 border-slate-300 relative">
                                    <h3 className="font-black text-slate-800 mb-1.5 tracking-widest text-center text-xs">ULTIMATE DEFENSE</h3>
                                    {(!advMaxed || !rdMaxed) && (<div className="absolute inset-0 bg-white/80 backdrop-blur-[2px] z-10 flex items-center justify-center rounded-xl"></div>)}
                                    {!user.tech.fenceUnlocked ? (
                                        <button onClick={() => handleUpgrade('ultimateFenceUnlock')} disabled={user.gold < UPGRADE_COSTS.ultimateFenceUnlock} className={`w-full p-3 rounded-xl font-black flex flex-col items-center justify-center gap-1 transition-all btn-3d ${user.gold >= UPGRADE_COSTS.ultimateFenceUnlock ? 'bg-yellow-500 hover:bg-yellow-400 text-slate-900 shadow-md border-yellow-700' : 'bg-slate-300 text-slate-500 border-slate-400'}`}><div className="flex items-center gap-1 text-xs"><Icon name="Fence" size={16}/> UNLOCK SECURITY FENCE</div><span className="text-[9px] text-center font-bold text-yellow-800">Unbreakable shield. Maintenace: 5L/base/5min.</span><span className="text-[9px] bg-slate-900 text-yellow-400 px-1.5 py-0.5 rounded mt-0.5">COST: {(UPGRADE_COSTS.ultimateFenceUnlock/1000000)}M Gold</span></button>
                                    ) : (
                                        <button onClick={() => { cancelTargeting(); engine.current.targetingFence = true; setShowCommandCenter(false); }} disabled={user.fencesCount >= 5} className={`w-full p-3 rounded-xl font-black flex flex-col items-center justify-center gap-1 transition-all btn-3d ${user.fencesCount < 5 ? 'bg-yellow-500 hover:bg-yellow-400 text-slate-900 shadow-md border-yellow-700' : 'bg-slate-300 text-slate-500 border-slate-400'}`}><div className="flex items-center gap-1 text-xs"><Icon name="Fence" size={16}/> APPLY ULTIMATE FENCE ({user.fencesCount}/5)</div><span className="text-[9px] text-center font-bold">Click map base to apply unbreakable shield.</span></button>
                                    )}
                                </div>
                            </div>
                            <div className="h-6"></div>
                        </div>
                    </div>

                    {/* Targeting Indicators */}
                    {state.targetingMissile && <div className="absolute top-20 left-1/2 transform -translate-x-1/2 z-20 bg-red-600 text-white px-6 py-2.5 rounded-full font-black text-sm flex items-center gap-2 animate-pulse shadow-md tracking-widest border-2 border-red-400 pointer-events-none"><Icon name="Crosshair" size={18} /> SELECT TARGET</div>}
                    {state.targetingCannonDeploy && <div className="absolute top-20 left-1/2 transform -translate-x-1/2 z-20 bg-yellow-400 text-slate-900 px-6 py-2.5 rounded-full font-black text-sm flex items-center gap-2 animate-pulse shadow-md tracking-widest border-2 border-yellow-200 pointer-events-none"><Icon name="Target" size={18} /> SELECT BASE FOR CANNON</div>}
                    {state.targetingNMC && <div className="absolute top-20 left-1/2 transform -translate-x-1/2 z-20 bg-purple-600 text-white px-6 py-2.5 rounded-full font-black text-sm flex items-center gap-2 animate-pulse shadow-md tracking-widest border-2 border-purple-400 pointer-events-none"><Icon name="Radiation" size={18} /> SELECT BASE FOR NMC</div>}
                    {state.targetingCarrierId !== null && <div className="absolute top-20 left-1/2 transform -translate-x-1/2 z-20 bg-blue-600 text-white px-6 py-2.5 rounded-full font-black text-sm flex items-center gap-2 animate-pulse shadow-md tracking-widest border-2 border-blue-400 pointer-events-none"><Icon name="Anchor" size={18} /> TETHER CARRIER TO BASE</div>}
                    {state.targetingFence && <div className="absolute top-20 left-1/2 transform -translate-x-1/2 z-20 bg-yellow-500 text-slate-900 px-6 py-2.5 rounded-full font-black text-sm flex items-center gap-2 animate-pulse shadow-md tracking-widest border-2 border-yellow-300 pointer-events-none"><Icon name="Fence" size={18} /> SELECT BASE FOR FENCE</div>}
                    {state.targetingSupporter && <div className="absolute top-20 left-1/2 transform -translate-x-1/2 z-20 bg-emerald-500 text-white px-6 py-2.5 rounded-full font-black text-sm flex items-center gap-2 animate-pulse shadow-md tracking-widest border-2 border-emerald-300 pointer-events-none"><Icon name="Truck" size={18} /> SELECT CANNON FOR SUPPORTER</div>}
                    {state.targetingAutoLauncher && <div className="absolute top-20 left-1/2 transform -translate-x-1/2 z-20 bg-orange-500 text-white px-6 py-2.5 rounded-full font-black text-sm flex items-center gap-2 animate-pulse shadow-md tracking-widest border-2 border-orange-300 pointer-events-none"><Icon name="Rocket" size={18} /> SELECT 3 BASES ({state.autoLauncher.bases.length}/3)</div>}
                    {state.targetingOrbital && <div className="absolute top-20 left-1/2 transform -translate-x-1/2 z-20 bg-cyan-500 text-white px-6 py-2.5 rounded-full font-black text-sm flex items-center gap-2 animate-pulse shadow-md tracking-widest border-2 border-cyan-300 pointer-events-none"><Icon name="Radar" size={18} /> TARGET ORBITAL STRIKE</div>}
                    {state.targetingEMP && <div className="absolute top-20 left-1/2 transform -translate-x-1/2 z-20 bg-indigo-500 text-white px-6 py-2.5 rounded-full font-black text-sm flex items-center gap-2 animate-pulse shadow-md tracking-widest border-2 border-indigo-300 pointer-events-none"><Icon name="Zap" size={18} /> SELECT AREA FOR EMP</div>}
                    {state.targetingAutoRifle && <div className="absolute top-20 left-1/2 transform -translate-x-1/2 z-20 bg-emerald-600 text-white px-6 py-2.5 rounded-full font-black text-sm flex items-center gap-2 animate-pulse shadow-md tracking-widest border-2 border-emerald-400 pointer-events-none"><Icon name="Target" size={18} /> SELECT BASE FOR AUTO-RIFLE</div>}
                    {state.targetingDeployArmy && <div className="absolute top-20 left-1/2 transform -translate-x-1/2 z-20 bg-orange-500 text-white px-6 py-2.5 rounded-full font-black text-sm flex items-center gap-2 animate-pulse shadow-md tracking-widest border-2 border-orange-300 pointer-events-none"><Icon name="Sword" size={18} /> SELECT BASE TO DEPLOY ARMY</div>}

                    {gameOver && (
                        <div className="absolute inset-0 bg-slate-900/90 backdrop-blur-xl z-50 flex items-center justify-center pointer-events-auto">
                            <div className="bg-slate-800 p-10 rounded-[2rem] text-center max-w-xl shadow-[0_0_80px_rgba(0,0,0,1)] border-2 border-slate-700 relative overflow-hidden">
                                <div className="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
                                <div className="relative z-10">
                                    {winner === "User" ? ( <><Icon name="Crown" size={80} className="mx-auto text-yellow-400 mb-4 drop-shadow-[0_0_20px_rgba(250,204,21,0.6)]"/><h2 className="text-6xl font-black text-white mb-2 font-['Space_Grotesk']">VICTORY</h2></> ) : ( <><Icon name="Skull" size={80} className="mx-auto text-red-500 mb-4 drop-shadow-[0_0_20px_rgba(239,68,68,0.6)]"/><h2 className="text-6xl font-black text-red-500 mb-2 font-['Space_Grotesk']">DEFEATED</h2></> )}
                                    <p className="text-slate-300 text-lg font-bold mb-8">The world has been reshaped.</p>
                                    <button onClick={() => window.location.reload()} className="bg-blue-600 hover:bg-blue-500 text-white font-black py-4 px-12 rounded-xl text-xl w-full shadow-lg btn-3d border-blue-800 transition-colors">PLAY AGAIN</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
